services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_MODE=debug
      - SERVER_ADDRESS=:8080
      - DATABASE_DSN=host=postgres user=postgres password=postgres dbname=budget_family port=5432 sslmode=disable
      - AUTH_JWT_SECRET=change-me
      - AUTH_ACCESS_TTL=15m
      - AUTH_REFRESH_TTL=720h
      - AUTH_PASSWORD_COST=12
      - AUTH_ISSUER=budget-family
      - REDIS_ENABLED=false
      - REDIS_ADDR=redis:6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=budget_family
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  migrate:
    image: migrate/migrate:v4.17.1
    profiles: ["tools"]
    depends_on:
      - postgres
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate", "-path", "/migrations", "-database", "postgres://postgres:postgres@postgres:5432/budget_family?sslmode=disable"]

volumes:
  pgdata:
